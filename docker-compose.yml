version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: topon_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-topon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-topon_secret}
      POSTGRES_DB: ${POSTGRES_DB:-topon_db}
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U topon']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: topon_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

volumes:
  postgres_data:
  redis_data:
